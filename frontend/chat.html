<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/message-section.css">
    <link rel="stylesheet" href="styles/sidebar.css">
</head>
<body>
    <div class="main-container">
        <div class="sidebar">
            <button class="new-chat">
                + New Chat
            </button>
            <div class="recent-conversations">
                <h3 class="recent-heading">Recents</h3>
            <div class="conversations">
                <button class="conversation">
                    Conversation 1
                </button>
                <button class="conversation">
                    Conversation 2
                </button>
                <button class="conversation">
                    Conversation 3
                </button>
            </div>
            </div>
            <button class="profile">
                <img class="profile-picture" src="project-pictures/cute_cat.avif">
                <span class="profile-name">Farhan Khan</span>
            </button>
        </div>

        <div class="message-section">
            <div class="chat-header">
                <h1 class="title">
                    AI Assistant
                </h1>
            </div>

            <div class="message-container">

            </div>

            <div class="input-section">
                <input type="text" class="user-input" placeholder="type a message">
                <button class="send-button">
                    Send
                </button>
            </div>
        </div>
    </div>
</body>
</html>
